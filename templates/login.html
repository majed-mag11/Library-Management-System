{% extends "layout.html" %}

{% block title %}Login{% endblock %}

{% block body %}
<div class="auth-box">
    <h3 class="text-center mb-3" style="color:#2E4F4F;">Login</h3>

    <form action="/login" method="post">
        <input name="username" class="form-control my-2" placeholder="Username">
        <input name="password" type="password" class="form-control my-2" placeholder="Password">

        <button class="btn btn-library w-100 mt-3">Login</button>
    </form>
</div>
{% endblock %}
