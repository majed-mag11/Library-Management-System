{% extends "layout.html" %}

{% block title %} Add Book {% endblock %}

{% block body %}

<div class="auth-box">
    <h3 class="text-center mb-3" style="color:#2E4F4F;">Add New Book</h3>

    <form action="/add_books" method="POST">

        <input name="title" class="form-control my-2" placeholder="Title" required>

        <input name="author" class="form-control my-2" placeholder="Author" required>

        <input name="genre" class="form-control my-2" placeholder="Genre" required>

        <input name="stock" type="number" class="form-control my-2" placeholder="Stock" min="1" required>

        <input name="buy_price" type="number" step="0.01" class="form-control my-2" placeholder="Buy Price" required>

        <input name="borrow_fee" type="number" step="0.01" class="form-control my-2" placeholder="Borrow Fee" required>

        <select name="status" class="form-control my-2">
            <option value="active">Active</option>
            <option value="suspended">Suspended</option>
        </select>

        <button class="btn btn-library w-100 mt-3">Add</button>

    </form>
</div>

{% endblock %}
